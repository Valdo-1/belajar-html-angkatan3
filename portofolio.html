<!DOCTYPE html>
<html lang="id">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio</title>

    <link rel="stylesheet" href="style-portofolio.css">
</head>

<body>

    <header class="navbar">
        <div class="nav-container">
            <h2 class="logo">MyPortfolio</h2>
            <button onclick="toggleMenu()">☰</button>
            <nav id="menu">
                <a href="#home">Home</a>
                <a href="#ability">Ability</a>
                <a href="#about">About</a>
                <a href="#contact">Kontak</a>
            </nav>
        </div>

    <section class="home bg-1" id="home">

                        <li>Belajar Di ppkd</li>

                        <li>Lulusan PNJ</li>
                        <li>DLL</li>

                </div>
            </div>
        </div>
    </section>

            <div class="gallery">
                <figure>

                        alt="">
                    <figcaption>gambar 1</figcaption>
                </figure>

                <figure><img
                        src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcST_ZSWhYj1OcLoWCGCbxKt3KUxEBVV-zThZwJy2nMfdQ&s=10"

    <section id="Contact" class="normal-section">
        <h2>Kontak</h2>
        <form action="" method="post" class="Contact-form">

            <input type="text" placeholder="Nama">

            <input type="email" placeholder="ex:example@gmail.com">

            <textarea placeholder="Pesan"></textarea>

            <button>Kirim</button>

        </form>



    </section>

<script>
    function toggleMenu(){
        document.getElementById("menu").classList.toggle("show");
    }
</script>



</body>

</html>
